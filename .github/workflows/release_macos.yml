name: Build macOS DMG

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build DMG
        shell: bash
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PersonalRAG.dmg

